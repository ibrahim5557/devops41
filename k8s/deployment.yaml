apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops41-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops41
  template:
    metadata:
      labels:
        app: devops41
    spec:
      containers:
        - name: devops41
          image: samsunlu/devops41:latest
          ports:
            - containerPort: 8081